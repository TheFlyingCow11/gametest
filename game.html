<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
touch-action:none;
}

/* רקע 4 רבעים */
#map{
position:fixed;
width:100vw;
height:100vh;
background:
linear-gradient(to right,
#ff6b6b 50%,
#4dabf7 50%),
linear-gradient(to bottom,
transparent 50%,
#51cf66 50%);
background-blend-mode:multiply;
}

/* הדמות */
#player{
width:60px;
height:60px;
background:black;
position:absolute;
left:200px;
top:200px;
border-radius:12px;
}
</style>
</head>

<body>

<div id="map"></div>
<div id="player"></div>

<script>

let player = document.getElementById("player");

let playerX = 200;
let playerY = 200;

let lastX = 0;
let lastY = 0;

document.addEventListener("touchstart", e=>{
let t = e.touches[0];
lastX = t.clientX;
lastY = t.clientY;
});

document.addEventListener("touchmove", e=>{

e.preventDefault();

let t = e.touches[0];

let dx = t.clientX - lastX;
let dy = t.clientY - lastY;

playerX += dx;
playerY += dy;

player.style.left = playerX + "px";
player.style.top = playerY + "px";

lastX = t.clientX;
lastY = t.clientY;

});

</script>

</body>
</html>
