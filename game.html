<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>

body{
margin:0;
overflow:hidden;
touch-action:none;
font-family:Arial;
}

/* רקע */

#map{
position:fixed;
width:100vw;
height:100vh;
background:
linear-gradient(to right,#ff6b6b 50%,#4dabf7 50%),
linear-gradient(to bottom,transparent 50%,#51cf66 50%);
background-blend-mode:multiply;
}

/* דמות */

#player{
width:60px;
height:60px;
position:absolute;
left:200px;
top:200px;
display:flex;
align-items:center;
justify-content:center;
}

#frame{
width:100%;
height:100%;
background:black;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

#middle{
width:70%;
height:70%;
background:#ff6b6b;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
}

#core{
width:40%;
height:40%;
background:#ff6b6b;
border-radius:6px;
}

/* אש */

#trail{
position:absolute;
width:40px;
height:40px;
background:orange;
border-radius:50%;
opacity:0;
pointer-events:none;
filter:blur(10px);
}

/* HUD */

#version{
position:fixed;
top:5px;
left:10px;
font-size:14px;
color:white;
background:black;
padding:4px 8px;
border-radius:6px;
}

#timer{
position:fixed;
top:5px;
right:10px;
font-size:14px;
color:white;
background:black;
padding:4px 8px;
border-radius:6px;
}

</style>
</head>

<body>

<div id="map"></div>

<div id="trail"></div>

<div id="player">
<div id="frame">
<div id="middle">
<div id="core"></div>
</div>
</div>
</div>

<div id="version">v1.3</div>
<div id="timer">0</div>

<script>

let player = document.getElementById("player");
let middle = document.getElementById("middle");
let core = document.getElementById("core");
let trail = document.getElementById("trail");
let map = document.getElementById("map");

let playerX = 200;
let playerY = 200;
let playerSize = 60;

let lastX = 0;
let lastY = 0;

let touchingPlayer = false;
let started = false;

/* צבעים */

let colors = [
"#ff6b6b",
"#4dabf7",
"#51cf66",
"#ffffff"
];

let bgIndex = 0;

let currentIndex = 0;
let nextIndex = 1;

/* התחלת נגיעה */

document.addEventListener("touchstart", e=>{

let t = e.touches[0];
let rect = player.getBoundingClientRect();

if(
t.clientX >= rect.left &&
t.clientX <= rect.right &&
t.clientY >= rect.top &&
t.clientY <= rect.bottom
){

touchingPlayer = true;

if(!started){
startGame();
}

lastX = t.clientX;
lastY = t.clientY;

}

});

/* סוף נגיעה */

document.addEventListener("touchend", ()=>{

touchingPlayer = false;

});

/* תנועה */

document.addEventListener("touchmove", e=>{

if(!touchingPlayer) return;

e.preventDefault();

let t = e.touches[0];

let dx = t.clientX - lastX;
let dy = t.clientY - lastY;

let speed = Math.sqrt(dx*dx + dy*dy);

playerX += dx;
playerY += dy;

/* גבולות */

let maxX = window.innerWidth - playerSize;
let maxY = window.innerHeight - playerSize;

if(playerX < 0) playerX = 0;
if(playerY < 0) playerY = 0;
if(playerX > maxX) playerX = maxX;
if(playerY > maxY) playerY = maxY;

player.style.left = playerX + "px";
player.style.top = playerY + "px";

/* אש */

if(speed > 15){

trail.style.opacity = 0.7;
trail.style.left = playerX + 10 + "px";
trail.style.top = playerY + 10 + "px";

setTimeout(()=>{
trail.style.opacity = 0;
},100);

}

lastX = t.clientX;
lastY = t.clientY;

});

/* התחלת משחק */

function startGame(){

started = true;

startTimer();
startColors();
startBackgroundChange();

}

/* טיימר */

function startTimer(){

let time = 0;
let timer = document.getElementById("timer");

setInterval(()=>{

time++;
timer.innerText = time + "s";

},1000);

}

/* שינוי צבע הדמות */

function startColors(){

setInterval(()=>{

currentIndex = nextIndex;
nextIndex = (nextIndex + 1) % colors.length;

middle.style.background = colors[currentIndex];

},10000);

setInterval(()=>{

core.style.background = colors[nextIndex];

},7000);

}

/* שינוי רקע אחרי 30 שניות */

function startBackgroundChange(){

setTimeout(()=>{

setInterval(()=>{

bgIndex++;
bgIndex %= colors.length;

let c1 = colors[bgIndex];
let c2 = colors[(bgIndex+1)%colors.length];
let c3 = colors[(bgIndex+2)%colors.length];

map.style.background =
`linear-gradient(to right,${c1} 50%,${c2} 50%),
 linear-gradient(to bottom,transparent 50%,${c3} 50%)`;

},8000);

},30000);

}

</script>

</body>
</html>
