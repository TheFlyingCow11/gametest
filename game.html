<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
margin:0;
overflow:hidden;
touch-action:none;
font-family:Arial;
}

#map{
position:fixed;
width:100vw;
height:100vh;
background:
linear-gradient(to right,#ff6b6b 50%,#4dabf7 50%),
linear-gradient(to bottom,transparent 50%,#51cf66 50%);
background-blend-mode:multiply;
}

#player{
width:60px;
height:60px;
position:absolute;
left:200px;
top:200px;
display:flex;
align-items:center;
justify-content:center;
}

#frame{
width:100%;
height:100%;
background:black;
border-radius:12px;
display:flex;
align-items:center;
justify-content:center;
}

#middle{
width:70%;
height:70%;
background:#ff6b6b;
border-radius:8px;
display:flex;
align-items:center;
justify-content:center;
}

#core{
width:40%;
height:40%;
background:#ff6b6b;
border-radius:6px;
}

.trail{
position:absolute;
width:20px;
height:20px;
background:orange;
border-radius:50%;
opacity:0.5;
pointer-events:none;
filter:blur(8px);
transition: opacity 0.3s;
}

#version{
position:fixed;
top:5px;
left:10px;
font-size:14px;
color:white;
background:black;
padding:4px 8px;
border-radius:6px;
}

#timer{
position:fixed;
top:5px;
right:10px;
font-size:14px;
color:white;
background:black;
padding:4px 8px;
border-radius:6px;
}

</style>
</head>
<body>

<div id="map"></div>

<div id="player">
<div id="frame">
<div id="middle">
<div id="core"></div>
</div>
</div>
</div>

<div id="version">v1.4</div>
<div id="timer">0</div>

<script>

let player = document.getElementById("player");
let middle = document.getElementById("middle");
let core = document.getElementById("core");
let map = document.getElementById("map");

let playerX = 200;
let playerY = 200;
let playerSize = 60;

let lastX = 0;
let lastY = 0;

let touching = false;
let started = false;

let colors = ["#ff6b6b","#4dabf7","#51cf66","#ffffff"];
let currentIndex = 0;
let nextIndex = 1;

/* trail system */
let trails = [];

/* טיימר */
let time = 0;
let timer = document.getElementById("timer");

/* בדיקת התחלה קרובה לדמות */
function isNearPlayer(x,y){
let rect = player.getBoundingClientRect();
return x >= rect.left-20 && x <= rect.right+20 &&
       y >= rect.top-20 && y <= rect.bottom+20;
}

/* נגיעה */
document.addEventListener("touchstart", e=>{
let t = e.touches[0];
if(isNearPlayer(t.clientX,t.clientY)){
touching = true;
if(!started) startGame();
lastX = t.clientX;
lastY = t.clientY;
}
});

document.addEventListener("touchend", ()=>{
touching = false;
});

/* תנועה */
document.addEventListener("touchmove", e=>{
if(!touching) return;
e.preventDefault();
let t = e.touches[0];
let dx = t.clientX - lastX;
let dy = t.clientY - lastY;
let speed = Math.sqrt(dx*dx+dy*dy);

playerX += dx;
playerY += dy;

let maxX = window.innerWidth - playerSize;
let maxY = window.innerHeight - playerSize;

if(playerX < 0) playerX = 0;
if(playerY < 0) playerY = 0;
if(playerX > maxX) playerX = maxX;
if(playerY > maxY) playerY = maxY;

player.style.left = playerX + "px";
player.style.top = playerY + "px";

lastX = t.clientX;
lastY = t.clientY;

/* אש – trail */
if(speed>5){
let tr = document.createElement("div");
tr.classList.add("trail");
tr.style.left = (playerX+20) + "px";
tr.style.top = (playerY+20) + "px";
document.body.appendChild(tr);
trails.push({el:tr,life:10});
}
});

/* עדכון trail */
function updateTrails(){
for(let i=trails.length-1;i>=0;i--){
let tr = trails[i];
tr.life--;
tr.el.style.opacity = tr.life/10;
tr.el.style.left = parseFloat(tr.el.style.left) + (Math.random()*4-2) + "px";
tr.el.style.top = parseFloat(tr.el.style.top) + (Math.random()*4-2) + "px";
if(tr.life<=0){
tr.el.remove();
trails.splice(i,1);
}
}
requestAnimationFrame(updateTrails);
}

/* התחלת משחק */
function startGame(){
started = true;
setInterval(()=>{time++; timer.innerText = time+"s";},1000);
startColors();
updateTrails();
startBackgroundSwap();
}

/* צבעי הדמות */
function startColors(){
setInterval(()=>{
currentIndex = nextIndex;
nextIndex = (nextIndex+1)%colors.length;
middle.style.background = colors[currentIndex];
},10000);

setInterval(()=>{
core.style.background = colors[nextIndex];
},7000);
}

/* החלפת צבעי רקע אחרי 30 שניות */
function startBackgroundSwap(){
setTimeout(()=>{
setInterval(()=>{
let c1 = colors[0], c2 = colors[1], c3 = colors[2], c4 = colors[3];
colors = [c2,c1,c4,c3]; // החלפה זוגות
map.style.background = 
`linear-gradient(to right,${colors[0]} 50%,${colors[1]} 50%),
 linear-gradient(to bottom,transparent 50%,${colors[2]} 50%)`;
},8000);
},30000);
}

</script>

</body>
</html>
