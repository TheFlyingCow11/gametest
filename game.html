<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
* { box-sizing: border-box; }
body {
  margin: 0;
  overflow: hidden;
  touch-action: none;
  font-family: Arial;
  user-select: none;
}
#map {
  position: fixed;
  width: 100vw;
  height: 100vh;
  overflow: hidden;
}
.quad {
  position: absolute;
  width: 50%;
  height: 50%;
}
#player {
  width: 60px;
  height: 60px;
  position: absolute;
  left: 200px;
  top: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
  cursor: grab;
  z-index: 10;
}
#frame {
  width: 100%;
  height: 100%;
  background: black;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#middle {
  width: 70%;
  height: 70%;
  background: gray;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
  transition: background 0.2s;
}
#core {
  width: 40%;
  height: 40%;
  background: gray;
  border-radius: 6px;
  transition: background 0.2s;
}
#version {
  position: fixed;
  top: 5px; left: 10px;
  font-size: 14px;
  color: white;
  background: black;
  padding: 4px 8px;
  border-radius: 6px;
  z-index: 20;
}
#timer {
  position: fixed;
  top: 5px; right: 10px;
  font-size: 16px;
  font-weight: bold;
  color: white;
  background: black;
  padding: 4px 10px;
  border-radius: 6px;
  z-index: 20;
  letter-spacing: 1px;
}
#hint {
  position: fixed;
  bottom: 30px;
  left: 50%;
  transform: translateX(-50%);
  font-size: 16px;
  color: white;
  background: rgba(0,0,0,0.6);
  padding: 8px 16px;
  border-radius: 8px;
  z-index: 20;
  pointer-events: none;
}
#trailCanvas {
  position: fixed;
  top: 0; left: 0;
  pointer-events: none;
  z-index: 6;
}
</style>
</head>
<body>

<canvas id="trailCanvas"></canvas>
<div id="map"></div>
<div id="player">
  <div id="frame">
    <div id="middle">
      <div id="core"></div>
    </div>
  </div>
</div>
<div id="version">v2.4</div>
<div id="timer">0:00</div>
<div id="hint">move to start</div>

<script>
const playerEl    = document.getElementById("player");
const middle      = document.getElementById("middle");
const core        = document.getElementById("core");
const timerEl     = document.getElementById("timer");
const hint        = document.getElementById("hint");
const mapEl       = document.getElementById("map");
const trailCanvas = document.getElementById("trailCanvas");
const trailCtx    = trailCanvas.getContext("2d");

let playerX = 200, playerY = 200;
const playerSize = 60;
let lastX = 0, lastY = 0;
let isDown  = false;
let started = false;
let gameOver = false;
let time = 0;

const COLORS = ["red", "blue", "green", "yellow"];

// Pixel positions for each of the 4 slots (set on resize too)
let W, H;
function getSlotPositions() {
  W = window.innerWidth;
  H = window.innerHeight;
  return [
    { x: 0,     y: 0     },  // top-left
    { x: W / 2, y: 0     },  // top-right
    { x: 0,     y: H / 2 },  // bottom-left
    { x: W / 2, y: H / 2 },  // bottom-right
  ];
}

// Each color has its own div and its own animated pixel position
const quads = {}; // color -> { el, x, y, tx, ty, animating }
COLORS.forEach((color, i) => {
  const slots = getSlotPositions();
  const d = document.createElement("div");
  d.classList.add("quad");
  d.style.background = color;
  d.style.left = slots[i].x + "px";
  d.style.top  = slots[i].y + "px";
  mapEl.appendChild(d);
  quads[color] = { el: d, x: slots[i].x, y: slots[i].y, tx: slots[i].x, ty: slots[i].y };
});

let currentColor = null;
let nextColor    = null;

// ── Quad animation loop ────────────────────────────────────
// We animate positions ourselves (no CSS transition) so we always
// know the exact pixel position of each color during the slide.

const SLIDE_SPEED = 0.018; // lerp factor per frame — lower = slower

function animateQuads() {
  COLORS.forEach(color => {
    const q = quads[color];
    q.x += (q.tx - q.x) * SLIDE_SPEED;
    q.y += (q.ty - q.y) * SLIDE_SPEED;
    q.el.style.left = q.x + "px";
    q.el.style.top  = q.y + "px";

    // Keep player's current color on top so it's always visible under player
    if (color === currentColor) {
      q.el.style.zIndex = 3;
    } else {
      q.el.style.zIndex = 1;
    }
  });
  if (!gameOver) requestAnimationFrame(animateQuads);
}

// ── Trail ──────────────────────────────────────────────────

trailCanvas.width  = window.innerWidth;
trailCanvas.height = window.innerHeight;
window.addEventListener("resize", () => {
  trailCanvas.width  = window.innerWidth;
  trailCanvas.height = window.innerHeight;
  // Reposition quads to new slot positions if not mid-swap
  const slots = getSlotPositions();
  COLORS.forEach((color, i) => {
    quads[color].tx = slots[i].x;
    quads[color].ty = slots[i].y;
  });
});

let trailPath = [];
const TRAIL_MAX = 50;

function addTrailPoint(x, y) {
  trailPath.push({ x, y });
  if (trailPath.length > TRAIL_MAX) trailPath.shift();
}

function drawTrail() {
  trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
  if (trailPath.length > 1) {
    for (let i = 1; i < trailPath.length; i++) {
      const t  = i / trailPath.length; // 0=tail 1=head
      const p0 = trailPath[i - 1];
      const p1 = trailPath[i];
      trailCtx.beginPath();
      trailCtx.moveTo(p0.x, p0.y);
      trailCtx.lineTo(p1.x, p1.y);
      trailCtx.strokeStyle = `rgba(0,0,0,${t * 0.75})`;
      trailCtx.lineWidth   = t * 22 + 3;
      trailCtx.lineCap     = "round";
      trailCtx.lineJoin    = "round";
      trailCtx.stroke();
    }
  }
  if (!gameOver) requestAnimationFrame(drawTrail);
  else trailCtx.clearRect(0, 0, trailCanvas.width, trailCanvas.height);
}

function shrinkTrail() {
  if (!isDown && trailPath.length > 0) trailPath.shift();
  if (!gameOver) setTimeout(shrinkTrail, 25);
}

// ── Input ──────────────────────────────────────────────────

function onDown(x, y) { isDown = true; lastX = x; lastY = y; }
function onUp()        { isDown = false; }

function onMove(x, y) {
  if (!isDown || gameOver) return;
  const dx = x - lastX;
  const dy = y - lastY;
  if (Math.sqrt(dx*dx + dy*dy) < 1) return;

  if (!started) {
    started = true;
    hint.style.display = "none";
    startGame();
  }

  playerX = Math.max(0, Math.min(window.innerWidth  - playerSize, playerX + dx));
  playerY = Math.max(0, Math.min(window.innerHeight - playerSize, playerY + dy));
  playerEl.style.left = playerX + "px";
  playerEl.style.top  = playerY + "px";
  lastX = x; lastY = y;

  addTrailPoint(playerX + playerSize / 2, playerY + playerSize / 2);
}

document.addEventListener("mousedown",  e => onDown(e.clientX, e.clientY));
document.addEventListener("mousemove",  e => onMove(e.clientX, e.clientY));
document.addEventListener("mouseup",    () => onUp());
document.addEventListener("touchstart", e => { const t = e.touches[0]; onDown(t.clientX, t.clientY); }, { passive: true });
document.addEventListener("touchmove",  e => { e.preventDefault(); const t = e.touches[0]; onMove(t.clientX, t.clientY); }, { passive: false });
document.addEventListener("touchend",   () => onUp());

// ── Game start ─────────────────────────────────────────────

function startGame() {
  animateQuads();
  drawTrail();
  shrinkTrail();
  startTimer();
  startCheckColor();
  startBackgroundSwap();

  currentColor = pickColor(null);
  nextColor    = pickColor(currentColor);
  setMiddle(null);
  setCore(currentColor);
  setTimeout(firstReveal, 5000);
}

// ── Color cycles ───────────────────────────────────────────

function firstReveal() {
  if (gameOver) return;
  setMiddle(currentColor);
  setCore(nextColor);
  setTimeout(() => { if (!gameOver) setMiddle(null); }, 4000);
  setTimeout(() => { runCycle(nextColor); },             5000);
}

function runCycle(incoming) {
  if (gameOver) return;
  currentColor = incoming;
  nextColor    = pickColor(currentColor);
  setMiddle(currentColor);
  setCore(nextColor);
  setTimeout(() => { if (!gameOver) setMiddle(null); }, 9000);
  setTimeout(() => { runCycle(nextColor); },             10000);
}

function setMiddle(color) {
  middle.style.background = color || "gray";
  currentColor = color;
}
function setCore(color) { core.style.background = color; }
function pickColor(avoid) {
  const pool = COLORS.filter(c => c !== avoid);
  return pool[Math.floor(Math.random() * pool.length)];
}

// ── Timer ──────────────────────────────────────────────────

function startTimer() {
  setInterval(() => {
    if (gameOver) return;
    time++;
    const mins = Math.floor(time / 60);
    const secs = String(time % 60).padStart(2, "0");
    timerEl.innerText = mins + ":" + secs;
  }, 1000);
}

// ── Background swap ────────────────────────────────────────

function startBackgroundSwap() {
  setTimeout(() => { setInterval(swapBackgrounds, 8000); }, 15000);
}

function swapBackgrounds() {
  const slots = getSlotPositions();
  // Assign each color to a new random slot
  const shuffledSlots = [...slots];
  for (let i = shuffledSlots.length - 1; i > 0; i--) {
    const j = Math.floor(Math.random() * (i + 1));
    [shuffledSlots[i], shuffledSlots[j]] = [shuffledSlots[j], shuffledSlots[i]];
  }
  COLORS.forEach((color, i) => {
    quads[color].tx = shuffledSlots[i].x;
    quads[color].ty = shuffledSlots[i].y;
  });
}

// ── Color check — uses real pixel positions of each quad div ─

function startCheckColor() {
  setInterval(() => {
    if (gameOver || !currentColor) return;

    // Player center
    const px = playerX + playerSize / 2;
    const py = playerY + playerSize / 2;

    // Check which color div the player center is inside RIGHT NOW
    // We use the actual animated x,y of each quad
    const hw = window.innerWidth  / 2;
    const hh = window.innerHeight / 2;

    let standing = null;
    for (const color of COLORS) {
      const q = quads[color];
      if (px >= q.x && px < q.x + hw && py >= q.y && py < q.y + hh) {
        standing = color;
        break;
      }
    }

    if (standing !== currentColor) {
      gameOver = true;
      playerEl.style.cursor = "default";
      const mins = Math.floor(time / 60);
      const secs = String(time % 60).padStart(2, "0");
      setTimeout(() => alert("Game Over! זמן: " + mins + ":" + secs), 50);
    }
  }, 50);
}
</script>
</body>
</html>
