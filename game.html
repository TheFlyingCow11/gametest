<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">

<style>
body{
    margin:0;
    overflow:hidden;
    touch-action:none;
    background:#87CEEB;
}

#player{
    width:60px;
    height:60px;
    background:red;
    position:absolute;
    left:150px;
    top:200px;
    border-radius:15px;
}
</style>
</head>

<body>

<div id="player"></div>

<script>

let player = document.getElementById("player");

let playerX = 150;
let playerY = 200;

let lastX = 0;
let lastY = 0;

document.addEventListener("touchstart", function(e){
    let touch = e.touches[0];
    lastX = touch.clientX;
    lastY = touch.clientY;
});

document.addEventListener("touchmove", function(e){

    e.preventDefault(); // מונע גלילה

    let touch = e.touches[0];

    let dx = touch.clientX - lastX;
    let dy = touch.clientY - lastY;

    playerX += dx;
    playerY += dy;

    player.style.left = playerX + "px";
    player.style.top = playerY + "px";

    lastX = touch.clientX;
    lastY = touch.clientY;

});

</script>

</body>
</html>
