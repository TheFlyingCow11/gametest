<!DOCTYPE html>
<html lang="he">
<head>
<meta charset="UTF-8">
<meta name="viewport" content="width=device-width, initial-scale=1.0">
<style>
body {
  margin: 0;
  overflow: hidden;
  touch-action: none;
  font-family: Arial;
}
#map {
  position: fixed;
  width: 100vw;
  height: 100vh;
  background:
    linear-gradient(to right, #ff6b6b 50%, #4dabf7 50%),
    linear-gradient(to bottom, transparent 50%, #51cf66 50%);
  background-blend-mode: multiply;
}
#player {
  width: 60px;
  height: 60px;
  position: absolute;
  left: 200px;
  top: 200px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#frame {
  width: 100%;
  height: 100%;
  background: black;
  border-radius: 12px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#middle {
  width: 70%;
  height: 70%;
  background: gray;
  border-radius: 8px;
  display: flex;
  align-items: center;
  justify-content: center;
}
#core {
  width: 40%;
  height: 40%;
  background: gray;
  border-radius: 6px;
}
.trail {
  position: absolute;
  width: 15px;
  height: 15px;
  background: black;
  border-radius: 50%;
  opacity: 0.4;
  pointer-events: none;
  filter: blur(4px);
}
#version {
  position: fixed;
  top: 5px;
  left: 10px;
  font-size: 14px;
  color: white;
  background: black;
  padding: 4px 8px;
  border-radius: 6px;
}
#timer {
  position: fixed;
  top: 5px;
  right: 10px;
  font-size: 14px;
  color: white;
  background: black;
  padding: 4px 8px;
  border-radius: 6px;
}
</style>
</head>
<body>

<div id="map"></div>
<div id="player">
  <div id="frame">
    <div id="middle">
      <div id="core"></div>
    </div>
  </div>
</div>
<div id="version">v1.7</div>
<div id="timer">0</div>

<script>
const player  = document.getElementById("player");
const middle  = document.getElementById("middle");
const core    = document.getElementById("core");
const map     = document.getElementById("map");
const timerEl = document.getElementById("timer");

let playerX = 200, playerY = 200;
const playerSize = 60;
let lastX = 0, lastY = 0;
let touching = false;
let started  = false;
let gameOver = false;
let trails   = [];
let time     = 0;

const COLORS = ["#ff6b6b", "#4dabf7", "#51cf66", "#ffd43b"];
let quadColors = [...COLORS];
let middleColorIndex = 0;
let nextColorIndex   = 1;

// ── Touch ──────────────────────────────────────────────────
document.addEventListener("touchstart", e => {
  touching = true;
  const t = e.touches[0];
  lastX = t.clientX;
  lastY = t.clientY;
  if (!started) startGame();
});

document.addEventListener("touchend", () => { touching = false; });

document.addEventListener("touchmove", e => {
  if (!touching || gameOver) return;
  e.preventDefault();
  const t  = e.touches[0];
  const dx = t.clientX - lastX;
  const dy = t.clientY - lastY;
  const speed = Math.sqrt(dx*dx + dy*dy);

  playerX = Math.max(0, Math.min(window.innerWidth  - playerSize, playerX + dx));
  playerY = Math.max(0, Math.min(window.innerHeight - playerSize, playerY + dy));

  player.style.left = playerX + "px";
  player.style.top  = playerY + "px";
  lastX = t.clientX;
  lastY = t.clientY;

  if (speed > 5) {
    const tr = document.createElement("div");
    tr.classList.add("trail");
    tr.style.left = (playerX + 22) + "px";
    tr.style.top  = (playerY + 22) + "px";
    document.body.appendChild(tr);
    trails.push({ el: tr, life: 10 });
  }
}, { passive: false });

// ── Trails ─────────────────────────────────────────────────
function updateTrails() {
  for (let i = trails.length - 1; i >= 0; i--) {
    const tr = trails[i];
    tr.life--;
    tr.el.style.opacity = (tr.life / 10 * 0.4).toString();
    if (tr.life <= 0) { tr.el.remove(); trails.splice(i, 1); }
  }
  if (!gameOver) requestAnimationFrame(updateTrails);
}

// ── Start ──────────────────────────────────────────────────
function startGame() {
  started = true;
  middle.style.background = "gray";
  core.style.background   = "gray";
  updateTrails();

  setTimeout(() => {
    startTimer();
    startBackgroundSwap();
    startCheckColor();
    runCycle();
  }, 5000);
}

// ── Color cycle ────────────────────────────────────────────
// Each cycle = 10 seconds:
//  t+0s  middle shows current color, core = gray
//  t+7s  core shows NEXT color (3s preview)
//  t+9s  core goes gray (1s warning)
//  t+10s advance indices, repeat
function runCycle() {
  if (gameOver) return;

  middle.style.background = COLORS[middleColorIndex];
  core.style.background   = "gray";

  setTimeout(() => {
    if (!gameOver) core.style.background = COLORS[nextColorIndex];
  }, 7000);

  setTimeout(() => {
    if (!gameOver) core.style.background = "gray";
  }, 9000);

  setTimeout(() => {
    if (gameOver) return;
    middleColorIndex = nextColorIndex;
    nextColorIndex   = (nextColorIndex + 1) % COLORS.length;
    runCycle();
  }, 10000);
}

// ── Timer ──────────────────────────────────────────────────
function startTimer() {
  setInterval(() => {
    if (!gameOver) { time++; timerEl.innerText = time + "s"; }
  }, 1000);
}

// ── Background swap ────────────────────────────────────────
function startBackgroundSwap() {
  setTimeout(() => {
    setInterval(() => {
      let tmp = quadColors[0]; quadColors[0] = quadColors[1]; quadColors[1] = tmp;
      tmp = quadColors[2]; quadColors[2] = quadColors[3]; quadColors[3] = tmp;
      map.style.background =
        `linear-gradient(to right, ${quadColors[0]} 50%, ${quadColors[1]} 50%),
         linear-gradient(to bottom, transparent 50%, ${quadColors[2]} 50%)`;
      map.style.backgroundBlendMode = "multiply";
    }, 8000);
  }, 30000);
}

// ── Color check ────────────────────────────────────────────
function startCheckColor() {
  setInterval(() => {
    if (gameOver) return;
    if (middle.style.background === "gray") return;

    const rect = player.getBoundingClientRect();
    const cx = rect.left + rect.width  / 2;
    const cy = rect.top  + rect.height / 2;
    const w  = window.innerWidth;
    const h  = window.innerHeight;

    let q;
    if      (cx < w/2 && cy < h/2)  q = 0;
    else if (cx >= w/2 && cy < h/2) q = 1;
    else if (cx < w/2 && cy >= h/2) q = 2;
    else                             q = 3;

    if (quadColors[q] !== COLORS[middleColorIndex]) {
      gameOver = true;
      setTimeout(() => alert("Game Over! זמן: " + time + "s"), 50);
    }
  }, 50);
}
</script>
</body>
</html>
